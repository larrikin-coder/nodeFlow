app = "nodeflow-frontend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.frontend"
  [build.args]
    NEXT_PUBLIC_API_URL = "https://nodeflow-backend.fly.dev"

[env]
  PORT = "3000"

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
