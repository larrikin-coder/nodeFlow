services:
  # ─────────────────────────────────────────
  # Temporal development server
  # ─────────────────────────────────────────
  temporal:
    image: temporalio/temporal:latest
    ports:
      - "7233:7233" # gRPC (SDK connections)
      - "8233:8233" # Temporal Web UI
    command: [ "server", "start-dev", "--ip", "0.0.0.0", "--ui-ip", "0.0.0.0" ]
    healthcheck:
      test: [ "CMD", "tctl", "cluster", "health" ]
      interval: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────
  # FastAPI backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Temporal worker
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      - TEMPORAL_HOST=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Next.js frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
