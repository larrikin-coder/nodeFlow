app = "nodeflow-backend"
primary_region = "sin"

[build]
  dockerfile   = "backend/Dockerfile.backend"

[env]
  PORT             = "8000"
  TEMPORAL_HOST      = "nodeflow-temporal.internal:7233"
  TEMPORAL_NAMESPACE = "default"
  # ALLOWED_ORIGINS set via: fly secrets set ALLOWED_ORIGINS=https://nodeflow-frontend.fly.dev --app nodeflow-backend

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
